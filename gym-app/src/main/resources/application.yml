spring:
  datasource:
    url: jdbc:h2:mem:gymdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway manda el schema
    open-in-view: false
    properties:
      hibernate.format_sql: true

  sql:
    init:
      mode: never

  mail:
    # Desactivado efectivamente (red corporativa / MVP)
    host: localhost
    port: 25

flyway:
  enabled: true
  locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

security:
  jwt:
    # >= 32 caracteres REALES, válido para HS256
    secret: "dev-secret-very-strong-32-characters-minimum!"
    expiration-minutes: 15