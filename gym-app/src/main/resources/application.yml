# src/main/resources/application.yml
spring:
  datasource:
    url: jdbc:h2:mem:gymdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: validate   # usamos Flyway para schema
    open-in-view: false
    properties:
      hibernate.format_sql: true
  sql.init.mode: never

flyway:
  enabled: true
  locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics